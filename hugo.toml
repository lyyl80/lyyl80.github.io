baseURL = "https://lyyl80.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "我的博客"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "一个极简风格的个人博客"
  author = "Your Name"
  defaultTheme = "auto"           # auto = 跟随系统明暗切换
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "你好，欢迎来到我的博客"
    Content = "这里记录我的思考、笔记与生活。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lyyl80"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your@email.com"

[params.assets]
  favicon = "/favicon.ico"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS", "JSON"]    # JSON 供 PaperMod 搜索功能使用

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 1

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 3

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4
