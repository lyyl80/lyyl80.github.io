baseURL = "https://lyyl80.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "我的博客"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "温暖米色调的个人博客，记录技术与思考"
  author = "lyyl80"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  # Profile Mode — 首页展示个人头像+简介
  [params.profileMode]
    enabled = true
    title = "Hi, I'm lyyl80"
    subtitle = "写代码，也写生活。记录技术笔记与日常思考。"
    imageUrl = "/avatar.png"
    imageTitle = "avatar"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lyyl80"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your@email.com"

[params.assets]
  favicon = "/favicon.ico"
  disableHLJS = true

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 2

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 4

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 5
